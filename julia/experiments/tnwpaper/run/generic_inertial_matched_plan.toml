# Supplemental generic-behaviour plan — matched-De_v cells + viscous high-De
# extension (two-limit checks, TnW v4).
#
# S07: inertial De_R grid = Oh × (viscous De_v grid), Oh = 0.005, so each cell
#      sits at the same viscous Deborah De_v = De_R/Oh as the S03 viscous cells.
#      This is the apples-to-apples test of the regime-INVARIANT Wi_e plateau.
# S08: viscous De_v extension to 300/1000/3000 to develop the post-corner
#      branch and the FE-limited plateau (phi^{-4/3} check).
# Ko, 2026-06-11.

[production]
out_root = "julia/experiments/tnwpaper/outputs/generic_inertial"

[templates]
caber = "experiments/tnwpaper/inputs/tnwpaper_caber_sweep_de.toml"

# ── S07 : inertial, matched De_v grid, constant drag, per-phi ────────────────
[[sweeps]]
kind = "caber_De"
folder = "S07_caber_inertial_matched_De_NK_3000_hsK_0p05_phi_0p01_drag_constant"
template = "caber"
set = [
  ["polymer.NK", 3000], ["polymer.hK_star", 0.05],
  ["model.fe_model", "fenepm"], ["model.drag_model", "constant"],
  ["concentration.phi", 0.01],
  ["flow.kind", "caber_inertial"], ["flow.Oh", 0.005], ["flow.X_R", 0.5115],
  ["flow.De_values", [5e-5, 1.5e-4, 5e-4, 1.5e-3, 5e-3, 1.5e-2, 5e-2, 0.15, 0.5, 1.5, 5.0, 15.0]],
]

[[sweeps]]
kind = "caber_De"
folder = "S07_caber_inertial_matched_De_NK_3000_hsK_0p05_phi_0p1_drag_constant"
template = "caber"
set = [
  ["polymer.NK", 3000], ["polymer.hK_star", 0.05],
  ["model.fe_model", "fenepm"], ["model.drag_model", "constant"],
  ["concentration.phi", 0.1],
  ["flow.kind", "caber_inertial"], ["flow.Oh", 0.005], ["flow.X_R", 0.5115],
  ["flow.De_values", [5e-5, 1.5e-4, 5e-4, 1.5e-3, 5e-3, 1.5e-2, 5e-2, 0.15, 0.5, 1.5, 5.0, 15.0]],
]

[[sweeps]]
kind = "caber_De"
folder = "S07_caber_inertial_matched_De_NK_3000_hsK_0p05_phi_0p5_drag_constant"
template = "caber"
set = [
  ["polymer.NK", 3000], ["polymer.hK_star", 0.05],
  ["model.fe_model", "fenepm"], ["model.drag_model", "constant"],
  ["concentration.phi", 0.5],
  ["flow.kind", "caber_inertial"], ["flow.Oh", 0.005], ["flow.X_R", 0.5115],
  ["flow.De_values", [5e-5, 1.5e-4, 5e-4, 1.5e-3, 5e-3, 1.5e-2, 5e-2, 0.15, 0.5, 1.5, 5.0, 15.0]],
]

[[sweeps]]
kind = "caber_De"
folder = "S07_caber_inertial_matched_De_NK_3000_hsK_0p05_phi_1_drag_constant"
template = "caber"
set = [
  ["polymer.NK", 3000], ["polymer.hK_star", 0.05],
  ["model.fe_model", "fenepm"], ["model.drag_model", "constant"],
  ["concentration.phi", 1.0],
  ["flow.kind", "caber_inertial"], ["flow.Oh", 0.005], ["flow.X_R", 0.5115],
  ["flow.De_values", [5e-5, 1.5e-4, 5e-4, 1.5e-3, 5e-3, 1.5e-2, 5e-2, 0.15, 0.5, 1.5, 5.0, 15.0]],
]

# ── S08 : viscous high-De extension, constant drag, per-phi ──────────────────
[[sweeps]]
kind = "caber_De"
folder = "S08_caber_sweep_DeHi_NK_3000_hsK_0p05_phi_0p01_drag_constant"
template = "caber"
set = [
